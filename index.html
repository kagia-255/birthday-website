<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
  <style>
    body {
      margin: 0;
      font-family: 'Times New Roman', Times, serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('image 2.jpeg') no-repeat center center fixed; /* ✅ her picture as background */
      background-size: cover; /* ✅ makes it cover the whole page */
    }

    /* Overlay to fade the picture */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(148, 130, 130, 0.6); /* ✅ adjust opacity for fade effect */
      z-index: 1;
    }

    .welcome-container {
      position: relative;
      z-index: 2; /* ✅ ensures text/button appear above faded image */
      text-align: center;
    }

    .welcome-container h1 {
      font-size: 2.5em;
      color: #ff4081;
      margin-bottom: 20px;
    }

    .welcome-container button {
      padding: 12px 24px;
      font-size: 1.2em;
      background-color: #ff4081;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .welcome-container button:hover {
      background-color: #e73370;
      box-shadow: 0 0 15px #ff4081;
    }
  </style>
</head>
<body>
  <!-- Faded overlay -->
  <div class="overlay"></div>

  <div class="welcome-container">
    <h1>HAPPY BIRTHDAY , MY LOVE 💖</h1>
    <button onclick="location.href='main.html'">Enter</button>
  </div>
</body>
</html>
